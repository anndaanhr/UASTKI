<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper Search | BM25</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="ambient-glow"></div>

    <main class="container">
        <!-- HEADER & SEARCH BAR -->
        <header class="header">
            <h1 class="logo">
                <i class="ph-fill ph-book-open"></i>
                Research<span class="highlight">Archive</span>
            </h1>
            <p class="subtitle">Information Retrieval System based on Okapi BM25</p>

            <div class="search-container">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search for research papers, authors, or topics..." autocomplete="off">
                <button id="searchBtn" class="primary-btn">Search</button>
            </div>
        </header>

        <!-- DASHBOARD BENTO GRID (Evaluation Metrics) -->
        <section class="dashboard-bento" id="bentoGrid">
            <div class="bento-header">
                <h2><i class="ph-fill ph-chart-polar"></i> System Performance Dashboard</h2>
                <button id="refreshEvalBtn" class="icon-btn" title="Refresh Evaluation"><i class="ph ph-arrows-clockwise"></i></button>
            </div>
            
            <div class="bento-grid">
                <!-- Skeleton Loading State -->
                <div class="bento-item skeleton"></div>
                <div class="bento-item skeleton"></div>
                <div class="bento-item skeleton"></div>
                <div class="bento-item skeleton"></div>
            </div>
        </section>

        <!-- SEARCH RESULTS -->
        <section class="results-section">
            <div class="results-header" id="resultsHeader" class="hidden">
                <h2 id="resultsCount"></h2>
                <div id="queryAnalysis" class="query-analysis hidden">
                    <!-- Dynamic analysis -->
                </div>
            </div>
            
            <div id="resultsGrid" class="results-grid">
                <!-- Dynamic Results Here -->
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <i class="ph-fill ph-ghost"></i>
                <h3>No papers found</h3>
                <p>Try different keywords or topics.</p>
            </div>
            
            <!-- Loading State -->
            <div id="loadingState" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Searching database...</p>
            </div>
        </section>
    </main>

    <!-- GLASSMORPHISM MODAL -->
    <div id="movieModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="closeModalBtn" class="close-btn"><i class="ph ph-x"></i></button>
            <div class="modal-body">
                <h2 id="modalTitle" class="modal-title"></h2>
                <div class="modal-meta">
                    <span id="modalDate" class="badge"></span>
                    <span id="modalLicense" class="badge badge-warning"></span>
                    <span id="modalScore" class="badge badge-success"></span>
                </div>
                
                <div class="modal-grid">
                    <div class="modal-col">
                        <h4>Source</h4>
                        <p id="modalSource"></p>
                    </div>
                    <div class="modal-col">
                        <h4>Author</h4>
                        <p id="modalAuthor"></p>
                    </div>
                </div>

                <h4>Abstract / Text</h4>
                <p id="modalDesc" class="modal-desc"></p>
            </div>
        </div>
    </div>

    <!-- TERMINAL CONSOLE -->
    <div class="terminal-container" id="terminalContainer">
        <div class="terminal-header">
            <span><i class="ph-fill ph-terminal"></i> Engine Logs</span>
            <button id="toggleTerminalBtn" class="icon-btn-small"><i class="ph ph-caret-down"></i></button>
        </div>
        <div class="terminal-body" id="terminalBody">
            <div class="log-line system">[SYS] BM25 Engine Initialized. Waiting for queries...</div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
